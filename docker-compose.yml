services:
  ml-service:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - db

  db:
    image: busybox
    command: tail -f /dev/null
    volumes:
      - ./phishing_logs.db:/phishing_logs.db

  # Proxy service to be added later